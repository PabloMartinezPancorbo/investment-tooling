<!DOCTYPE html>
<html lang="en" data-theme="dark" data-fun="false">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InvestIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ═══════════════════════════════════════════
   BASE TOKENS
═══════════════════════════════════════════ */
:root {
  --blue:       #1a6ef0;
  --blue-dim:   rgba(26,110,240,0.12);
  --blue-mid:   rgba(26,110,240,0.28);
  --green:      #16c784;
  --green-dim:  rgba(22,199,132,0.1);
  --green-mid:  rgba(22,199,132,0.25);
  --red:        #e5392b;
  --red-dim:    rgba(229,57,43,0.1);
  --amber:      #f59e0b;
  --amber-dim:  rgba(245,158,11,0.12);
  --purple:     #8b5cf6;
  --purple-dim: rgba(139,92,246,0.12);
  --radius:     6px;
  --nav-h:      56px;
}

[data-theme="dark"] {
  --bg:      #0e1219;
  --surface: #141a24;
  --surface2:#1a2132;
  --surface3:#1f2840;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text:    #dce4f0;
  --text-2:  rgba(220,228,240,0.55);
  --text-3:  rgba(220,228,240,0.28);
  --shadow:  0 2px 16px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg:      #f0f3f8;
  --surface: #ffffff;
  --surface2:#f5f7fb;
  --surface3:#eaeff7;
  --border:  rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --text:    #1a2132;
  --text-2:  rgba(26,33,50,0.6);
  --text-3:  rgba(26,33,50,0.35);
  --shadow:  0 2px 12px rgba(0,0,0,0.08);
}

/* ═══════════════════════════════════════════
   FUN MODE TOKENS
═══════════════════════════════════════════ */
[data-fun="true"] {
  --bg:      #05050f;
  --surface: #0c0c1a;
  --surface2:#111128;
  --surface3:#181835;
  --border:  rgba(0,255,255,0.15);
  --border2: rgba(0,255,255,0.3);
  --text:    #e0ffe0;
  --text-2:  rgba(0,255,200,0.7);
  --text-3:  rgba(0,255,200,0.35);
  --shadow:  0 0 30px rgba(0,255,255,0.15);
  --blue:    #00e5ff;
  --blue-dim:rgba(0,229,255,0.1);
  --blue-mid:rgba(0,229,255,0.35);
  --green:   #39ff14;
  --green-dim:rgba(57,255,20,0.1);
  --green-mid:rgba(57,255,20,0.3);
  --red:     #ff006e;
  --red-dim: rgba(255,0,110,0.12);
  --amber:   #ffcc00;
  --purple:  #bf00ff;
  --purple-dim: rgba(191,0,255,0.12);
  --radius:  2px;
  cursor: crosshair;
}

/* ═══════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════ */
@keyframes glitch {
  0%,95%,100%{ text-shadow: none; transform: translate(0); }
  96%{ text-shadow: -3px 0 #ff006e, 3px 0 #00e5ff; transform: translate(-2px,0); }
  97%{ text-shadow: 3px 0 #ff006e, -3px 0 #00e5ff; transform: translate(2px,1px); }
  98%{ text-shadow: -3px 0 #ff006e, 3px 0 #00e5ff; transform: translate(0,-1px); }
}

@keyframes neon-pulse {
  0%,100%{ box-shadow: 0 0 5px var(--blue), 0 0 10px var(--blue); }
  50%{ box-shadow: 0 0 12px var(--blue), 0 0 30px var(--blue), 0 0 50px var(--blue); }
}

@keyframes rainbow-border {
  0%  { border-color: #ff006e; }
  16% { border-color: #ff8c00; }
  33% { border-color: #ffe600; }
  50% { border-color: #39ff14; }
  67% { border-color: #00e5ff; }
  83% { border-color: #bf00ff; }
  100%{ border-color: #ff006e; }
}

@keyframes float {
  0%,100%{ transform: translateY(0px); }
  50%{ transform: translateY(-6px); }
}

@keyframes bounce-in {
  0%{ transform: scale(0.9); opacity:0; }
  60%{ transform: scale(1.04); }
  100%{ transform: scale(1); opacity:1; }
}

@keyframes scan {
  0%{ transform: translateY(-100%); }
  100%{ transform: translateY(100vh); }
}

@keyframes spin-slow {
  from{ transform: rotate(0deg); }
  to{ transform: rotate(360deg); }
}

@keyframes text-flicker {
  0%,19%,21%,23%,25%,54%,56%,100%{ opacity:1; }
  20%,24%,55%{ opacity:0.4; }
}

@keyframes ticker-scroll {
  0%{ transform: translateX(100%); }
  100%{ transform: translateX(-100%); }
}

@keyframes shimmer {
  0%{ background-position: -200% center; }
  100%{ background-position: 200% center; }
}

@keyframes wiggle {
  0%,100%{ transform: rotate(0deg); }
  25%{ transform: rotate(-5deg) scale(1.1); }
  75%{ transform: rotate(5deg) scale(1.1); }
}

@keyframes matrix-fall {
  0%{ opacity:1; transform: translateY(0); }
  100%{ opacity:0; transform: translateY(40px); }
}

/* ═══════════════════════════════════════════
   GLOBAL
═══════════════════════════════════════════ */
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }

body{
  background: var(--bg);
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  font-weight: 400;
  font-size: 14px;
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}

/* ─── FUN MODE: background grid + scanline ─── */
[data-fun="true"] body {
  background-image:
    linear-gradient(rgba(0,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  background-attachment: fixed;
}

[data-fun="true"] body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.08) 3px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none; z-index: 9999;
}

[data-fun="true"] * { font-family: 'JetBrains Mono', monospace !important; }
[data-fun="true"] h1,[data-fun="true"] h2,[data-fun="true"] .fun-heading {
  font-family: 'Orbitron', sans-serif !important;
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
.nav {
  position: sticky; top:0; z-index:100;
  height: var(--nav-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center;
  padding: 0 20px; gap:0;
  box-shadow: var(--shadow);
  transition: all 0.3s;
}

[data-fun="true"] .nav {
  border-bottom: 1px solid var(--border2);
  animation: neon-pulse 3s ease-in-out infinite;
  background: rgba(5,5,15,0.97);
}

.nav-brand {
  display:flex; align-items:center; gap:10px;
  margin-right:24px; text-decoration:none;
  flex-shrink:0;
}

.nav-icon {
  width:30px; height:30px; background:var(--blue);
  border-radius:7px; display:flex; align-items:center; justify-content:center;
  transition: all 0.3s;
}

[data-fun="true"] .nav-icon {
  border-radius:0;
  box-shadow: 0 0 10px var(--blue), 0 0 20px var(--blue);
  animation: neon-pulse 2s ease-in-out infinite;
}

.nav-icon svg{ width:16px; height:16px; fill:#fff; }
.nav-brand-name{ font-size:15px; font-weight:600; color:var(--text); letter-spacing:-0.01em; }

[data-fun="true"] .nav-brand-name {
  font-family: 'Orbitron', sans-serif !important;
  font-size: 13px;
  color: var(--blue);
  text-shadow: 0 0 8px var(--blue);
  letter-spacing: 0.05em;
  animation: glitch 4s infinite, text-flicker 6s infinite;
}

.nav-menu{ display:flex; align-items:center; gap:2px; flex:1; }
.nav-item{ position:relative; }

.nav-btn {
  display:flex; align-items:center; gap:5px;
  padding:7px 13px;
  background:transparent; border:none;
  font-family:'Figtree',sans-serif; font-size:13px; font-weight:500;
  color:var(--text-2); cursor:pointer; border-radius:var(--radius);
  transition:all 0.15s; white-space:nowrap;
}

.nav-btn:hover,.nav-btn.active{ color:var(--text); background:var(--surface2); }
.nav-btn.active{ color:var(--blue); }
.nav-btn svg{ width:12px; height:12px; transition:transform 0.2s; }
.nav-btn.open svg{ transform:rotate(180deg); }

[data-fun="true"] .nav-btn {
  border: 1px solid transparent;
  letter-spacing: 0.05em;
  font-size: 11px;
}
[data-fun="true"] .nav-btn:hover,
[data-fun="true"] .nav-btn.active {
  background: var(--blue-dim);
  border-color: var(--border2);
  color: var(--blue);
  text-shadow: 0 0 8px var(--blue);
}

.dropdown {
  position:absolute; top:calc(100% + 8px); left:0;
  min-width:220px; background:var(--surface);
  border:1px solid var(--border2); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden;
  opacity:0; pointer-events:none;
  transform:translateY(-6px); transition:all 0.18s;
}
.dropdown.open{ opacity:1; pointer-events:all; transform:translateY(0); }

[data-fun="true"] .dropdown {
  border-color: var(--blue-mid);
  box-shadow: 0 0 20px rgba(0,229,255,0.2);
  animation: bounce-in 0.2s ease-out;
}

.dropdown-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; cursor:pointer;
  transition:background 0.12s;
  border-bottom:1px solid var(--border);
}
.dropdown-item:last-child{ border-bottom:none; }
.dropdown-item:hover{ background:var(--surface2); }
.dropdown-item.active{ background:var(--blue-dim); }

.di-icon{ width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.di-label{ font-size:13px; font-weight:500; color:var(--text); }
.di-sub  { font-size:11px; color:var(--text-3); margin-top:1px; }

.nav-right{ margin-left:auto; display:flex; align-items:center; gap:6px; }

.icon-btn {
  width:34px; height:34px; border-radius:var(--radius);
  background:var(--surface2); border:1px solid var(--border2);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; color:var(--text-2); font-size:16px;
}
.icon-btn:hover{ color:var(--text); background:var(--surface3); }
.icon-btn svg{ width:16px; height:16px; }

[data-fun="true"] .icon-btn {
  border-radius:0; border-color:var(--border2);
  box-shadow: 0 0 6px rgba(0,229,255,0.3);
}

.fun-toggle-btn {
  position:relative; overflow:visible;
  font-size:18px; line-height:1;
}

.fun-toggle-btn.fun-on {
  animation: wiggle 0.5s ease-in-out infinite;
  background: rgba(57,255,20,0.1);
  border-color: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px var(--green);
}

/* ═══════════════════════════════════════════
   FUN TICKER TAPE
═══════════════════════════════════════════ */
.fun-tape {
  background: var(--surface2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  height: 28px; overflow: hidden;
  display: flex; align-items: center;
}

.fun-tape-inner {
  display: flex; gap: 60px;
  animation: ticker-scroll 25s linear infinite;
  white-space: nowrap;
  font-size: 10px; letter-spacing: 0.08em;
  color: var(--blue);
}

.fun-tape-item { display: inline-flex; align-items: center; gap: 8px; }
.fun-tape-up   { color: var(--green); }
.fun-tape-down { color: var(--red); }

/* ═══════════════════════════════════════════
   PAGE + PANELS
═══════════════════════════════════════════ */
.page{ max-width:1060px; margin:0 auto; padding:32px 20px 80px; }

[data-fun="true"] .page { padding-top: 24px; }

.panel {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  transition: all 0.3s;
}

[data-fun="true"] .panel {
  border-color: var(--blue-mid);
  box-shadow: inset 0 0 20px rgba(0,229,255,0.03), 0 0 15px rgba(0,229,255,0.1);
  animation: neon-pulse 4s ease-in-out infinite;
}

[data-fun="true"] .panel:hover {
  box-shadow: inset 0 0 30px rgba(0,229,255,0.06), 0 0 30px rgba(0,229,255,0.2);
}

.panel-head{ display:flex; align-items:center; gap:6px; margin-bottom:20px; }
.panel-dot { width:6px; height:6px; border-radius:50%; background:var(--blue); }

[data-fun="true"] .panel-dot {
  box-shadow: 0 0 6px var(--blue), 0 0 12px var(--blue);
  animation: text-flicker 2s infinite;
}

.panel-label{
  font-size:11px; font-weight:500;
  letter-spacing:0.08em; text-transform:uppercase; color:var(--text-2);
}

[data-fun="true"] .panel-label {
  color: var(--blue);
  text-shadow: 0 0 6px var(--blue);
  letter-spacing: 0.15em;
}

/* ═══════════════════════════════════════════
   CALC CONTROLS
═══════════════════════════════════════════ */
.calc-grid {
  display:grid; grid-template-columns:340px 1fr;
  gap:10px; margin-bottom:10px;
}
@media(max-width:740px){ .calc-grid{ grid-template-columns:1fr; } }

.ctrl{ margin-bottom:18px; }
.ctrl:last-child{ margin-bottom:0; }
.ctrl-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.ctrl-name{ font-size:12px; color:var(--text-2); }

[data-fun="true"] .ctrl-name {
  color: var(--text-2);
  font-size: 10px;
  letter-spacing: 0.05em;
}

.ctrl-val{
  font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500;
  color:var(--blue); background:var(--blue-dim); border:1px solid var(--blue-mid);
  border-radius:4px; padding:2px 8px;
}

[data-fun="true"] .ctrl-val {
  color: var(--green);
  background: var(--green-dim);
  border-color: var(--green-mid);
  text-shadow: 0 0 6px var(--green);
  border-radius: 0;
  animation: text-flicker 4s infinite;
}

input[type="range"]{
  -webkit-appearance:none; width:100%; height:3px;
  border-radius:2px; background:var(--surface3); outline:none; cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none; width:16px; height:16px;
  border-radius:50%; background:var(--blue); border:2.5px solid var(--bg);
  cursor:pointer; transition:transform 0.12s;
}
input[type="range"]::-webkit-slider-thumb:hover{ transform:scale(1.15); }
input[type="range"]::-moz-range-thumb{
  width:16px; height:16px; border-radius:50%;
  background:var(--blue); border:2.5px solid var(--bg); cursor:pointer;
}

[data-fun="true"] input[type="range"]{
  height:2px; background:rgba(0,229,255,0.2);
}
[data-fun="true"] input[type="range"]::-webkit-slider-thumb{
  background:var(--green); border-radius:0; width:12px; height:20px;
  box-shadow: 0 0 8px var(--green), 0 0 15px var(--green);
  border-color: var(--bg);
}

.freq{ display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-top:8px; }
.freq-btn{
  padding:7px 4px; background:var(--surface2); border:1px solid var(--border);
  border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:10px;
  color:var(--text-2); cursor:pointer; text-align:center; transition:all 0.12s;
}
.freq-btn.active{ background:var(--blue-dim); border-color:var(--blue-mid); color:var(--blue); }
.freq-btn:hover:not(.active){ background:var(--surface3); color:var(--text); }

[data-fun="true"] .freq-btn {
  border-radius:0; letter-spacing:0.05em;
}
[data-fun="true"] .freq-btn.active {
  background:var(--green-dim); border-color:var(--green-mid); color:var(--green);
  text-shadow:0 0 6px var(--green);
  box-shadow:inset 0 0 8px rgba(57,255,20,0.1);
}

.seg{
  display:flex; background:var(--surface2); border:1px solid var(--border2);
  border-radius:var(--radius); overflow:hidden;
}
.seg-btn{
  padding:6px 14px; background:transparent; border:none;
  font-family:'JetBrains Mono',monospace; font-size:12px;
  color:var(--text-2); cursor:pointer; transition:all 0.15s;
}
.seg-btn.active{ background:var(--blue); color:#fff; font-weight:500; }
.seg-btn:hover:not(.active){ color:var(--text); background:var(--surface3); }

[data-fun="true"] .seg{ border-radius:0; border-color:var(--border2); }
[data-fun="true"] .seg-btn.active{
  background:var(--blue);
  box-shadow:0 0 10px var(--blue);
}

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
.stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
.stat{
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
  transition:all 0.3s;
}
.stat.accent{ border-color:var(--green-mid); background:var(--green-dim); }

[data-fun="true"] .stat {
  border-radius:0; border-color:var(--blue-mid);
  animation: neon-pulse 3s ease-in-out infinite;
}
[data-fun="true"] .stat:nth-child(2){ animation-delay:0.5s; }
[data-fun="true"] .stat:nth-child(3){ animation-delay:1s; }

[data-fun="true"] .stat.accent {
  border-color:var(--green);
  box-shadow:0 0 10px var(--green-dim), inset 0 0 15px rgba(57,255,20,0.05);
  animation:none;
}

.stat-label{
  font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--text-3); margin-bottom:6px;
}
.stat.accent .stat-label{ color:rgba(22,199,132,0.6); }

[data-fun="true"] .stat-label { color:var(--blue-mid); }
[data-fun="true"] .stat.accent .stat-label { color:rgba(57,255,20,0.5); }

.stat-val{
  font-family:'JetBrains Mono',monospace; font-size:clamp(13px,2vw,17px);
  font-weight:500; color:var(--text); line-height:1;
}
.stat.accent .stat-val{ color:var(--green); }

[data-fun="true"] .stat-val { color:var(--blue); text-shadow:0 0 8px var(--blue); }
[data-fun="true"] .stat.accent .stat-val { color:var(--green); text-shadow:0 0 8px var(--green); }

/* ═══════════════════════════════════════════
   TICKER
═══════════════════════════════════════════ */
.ticker{
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  margin-bottom:12px; padding:9px 13px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:var(--radius);
}
.ticker-item{ display:flex; align-items:center; gap:5px; }
.ticker-key{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.07em; color:var(--text-3); text-transform:uppercase; }
.ticker-val{ font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500; }
.ticker-val.up{ color:var(--green); }
.ticker-val.neu{ color:var(--text-2); }
.ticker-sep{ width:1px; height:14px; background:var(--border2); }

[data-fun="true"] .ticker {
  border-radius:0; border-color:var(--border2);
  background:rgba(0,229,255,0.03);
}
[data-fun="true"] .ticker-val.up{ text-shadow:0 0 6px var(--green); }
[data-fun="true"] .ticker-key{ color:rgba(0,229,255,0.4); }

/* ═══════════════════════════════════════════
   CHART
═══════════════════════════════════════════ */
.legend{ display:flex; gap:14px; margin-bottom:10px; }
.legend-item{ display:flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-3); }
.legend-sq{ width:9px; height:9px; border-radius:2px; flex-shrink:0; }

.chart-wrap{ position:relative; width:100%; height:190px; }

[data-fun="true"] .chart-wrap {
  border:1px solid rgba(0,229,255,0.15);
  padding:4px;
  box-shadow:inset 0 0 20px rgba(0,229,255,0.05);
}

/* ═══════════════════════════════════════════
   TABLE
═══════════════════════════════════════════ */
.table-panel{
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden; margin-bottom:10px;
}
.table-top{
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 18px; border-bottom:1px solid var(--border);
}
.table-title{ font-size:11px; font-weight:500; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-2); }

const CURRENCIES = { '£':{ locale:'en-GB' }, '$':{ locale:'en-US' }, '€':{ locale:'de-DE' } };
const FREQS = [
  { label:'Annual',  key:'annual',    n:1   },
  { label:'Qtly',    key:'quarterly', n:4   },
  { label:'Monthly', key:'monthly',   n:12  },
  { label:'Daily',   key:'daily',     n:365 },
];
const fmtN = (n,s,l) => s+Math.round(n).toLocaleString(l);
const fmtK = (n,s) => n>=1e6?s+(n/1e6).toFixed(1)+'M':n>=1000?s+(n/1000).toFixed(0)+'k':s+Math.round(n);

function buildSchedule(P,rate,years,monthly,freqN){
  const r=(rate/100)/freqN,mpp=12/freqN;
  let bal=P,tc=P;
  return Array.from({length:years},(_,i)=>{
    let yi=0;
    for(let p=0;p<freqN;p++){const int=bal*r;yi+=int;bal+=int+monthly*mpp;tc+=monthly*mpp;}
    return{year:i+1,balance:Math.round(bal),totalContrib:Math.round(tc),yearInterest:Math.round(yi),totalGain:Math.round(bal-tc)};
  });
}

  const rows  = buildSchedule(principal,rate,years,monthly,freqN);
  const last  = rows[rows.length-1]||{balance:principal,totalContrib:principal,totalGain:0};

  const finalBal    = last.balance;

  const multiplier  = (finalBal/totalInvest).toFixed(2);
  const cagr        = ((Math.pow(finalBal/totalInvest,1/years)-1)*100).toFixed(1);

    ? { interest:'rgba(57,255,20,0.75)', invested:'rgba(0,229,255,0.4)',
        tooltip:'#080818', ttBorder:'rgba(0,229,255,0.3)',
        ttTitle:'rgba(0,229,255,0.5)', ttBody:'#e0ffe0',
        gridColor:'rgba(0,229,255,0.06)', tickColor:'rgba(0,229,255,0.3)' }
    : { interest:'rgba(22,199,132,0.7)', invested:'rgba(26,110,240,0.38)',
        tooltip:'#1a2132', ttBorder:'rgba(255,255,255,0.1)',
        ttTitle:'rgba(220,228,240,0.5)', ttBody:'#dce4f0',
        gridColor:'rgba(255,255,255,0.04)', tickColor:'rgba(220,228,240,0.28)' };

  useEffect(()=>{
    if(!canvasRef.current) return;
    const maxPts=Math.min(rows.length,25);
    const step=Math.max(1,Math.ceil(rows.length/maxPts));
    const pts=rows.filter((_,i)=>i%step===0||i===rows.length-1);
    const labels=pts.map(r=>`Y${r.year}`);
    const invested=pts.map(r=>r.totalContrib);
    const gains=pts.map(r=>Math.max(0,r.totalGain));

    if(chartInst){
      chartInst.data.labels=labels;
      chartInst.data.datasets[0].data=gains;
      chartInst.data.datasets[0].backgroundColor=C.interest;
      chartInst.data.datasets[1].data=invested;
      chartInst.data.datasets[1].backgroundColor=C.invested;
      chartInst.options.plugins.tooltip.backgroundColor=C.tooltip;
      chartInst.options.plugins.tooltip.titleColor=C.ttTitle;
      chartInst.options.plugins.tooltip.bodyColor=C.ttBody;
      chartInst.update('none');
    } else {
      chartInst=new Chart(canvasRef.current,{
        type:'bar',
        data:{ labels, datasets:[
          {label:'Interest',data:gains,    backgroundColor:C.interest,stack:'s',borderRadius:2},
          {label:'Invested',data:invested, backgroundColor:C.invested,stack:'s',borderRadius:0},
        ]},
        options:{
          responsive:true,maintainAspectRatio:false,animation:false,
          plugins:{
            legend:{display:false},
            tooltip:{
              backgroundColor:C.tooltip,borderColor:C.ttBorder,borderWidth:1,
              titleColor:C.ttTitle,bodyColor:C.ttBody,
              titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:11},
              callbacks:{
                title:ctx=>`Year ${ctx[0].label.replace('Y','')}`,
                label:ctx=>` ${ctx.dataset.label}: ${sym}${Math.round(ctx.raw).toLocaleString(locale)}`,
              },
            },
          },
          scales:{
            x:{stacked:true,grid:{display:false},border:{color:'rgba(255,255,255,0.06)'},
              ticks:{color:C.tickColor,font:{family:'JetBrains Mono',size:9},autoSkip:true,maxTicksLimit:12}},
            y:{stacked:true,grid:{color:C.gridColor},border:{display:false},
              ticks:{color:C.tickColor,font:{family:'JetBrains Mono',size:9},callback:v=>fmtK(v,sym)}},
          },
        },
      });
    }
  },[principal,rate,years,monthly,freq,currency,fun]);

  useEffect(()=>()=>{if(chartInst){chartInst.destroy();chartInst=null;}},[]);

  const title = T('Investment Calculator', fun);
  const sub   = T('Compound return projector', fun);

  return(
    <div className="page">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,gap:12,flexWrap:'wrap'}}>
        <div>
          <div className={`fun-heading`} style={{fontSize:fun?16:20,fontWeight:600,letterSpacing:fun?'0.05em':'-0.01em',color:fun?'var(--blue)':'var(--text)',textShadow:fun?'0 0 10px var(--blue)':'none',fontFamily:fun?'Orbitron, sans-serif':'inherit'}}>
            {title}
          </div>
          <div style={{fontSize:11,color:'var(--text-3)',fontFamily:'JetBrains Mono, monospace'}}>{sub}</div>
        </div>
        <div className="seg">
          {Object.keys(CURRENCIES).map(c=>(
            <button key={c} className={`seg-btn${currency===c?' active':''}`} onClick={()=>setCurrency(c)}>{c}</button>
          ))}
        </div>
      </div>

      <div className="calc-grid">
        <div className="panel">
          <div className="panel-head">
            <div className="panel-dot"></div>
            <span className="panel-label">{T('Parameters',fun)}</span>
          </div>
          <Slider label="Initial investment"   min={100}  max={200000} step={100} value={principal} onChange={setPrincipal} display={fmtN(principal,sym,locale)} fun={fun}/>
          <Slider label="Annual return rate"   min={0.5}  max={30}     step={0.5} value={rate}      onChange={setRate}      display={`${rate}%`}                  fun={fun}/>
          <Slider label="Time horizon"         min={1}    max={50}     step={1}   value={years}     onChange={setYears}     display={`${years} yr${years>1?'s':''}`} fun={fun}/>
          <Slider label="Monthly contribution" min={0}    max={10000}  step={50}  value={monthly}   onChange={setMonthly}   display={monthly===0?'—':fmtN(monthly,sym,locale)} fun={fun}/>
          <div className="ctrl">
            <div className="ctrl-top">
              <span className="ctrl-name">{T('Compounding frequency',fun)}</span>
            </div>
            <div className="freq">
              {FREQS.map(f=>(
                <button key={f.key} className={`freq-btn${freq===f.key?' active':''}`} onClick={()=>setFreq(f.key)}>
                  {T(f.label,fun)}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div className="panel">
          <div className="panel-head">
            <div className="panel-dot" style={{background:'var(--green)'}}></div>
            <span className="panel-label">{T('Projection',fun)}</span>
          </div>
          <div className="stats">
            <div className="stat">
              <div className="stat-label">{T('Invested',fun)}</div>
              <div className="stat-val">{fmtN(totalInvest,sym,locale)}</div>
            </div>
            <div className="stat">
              <div className="stat-label">{T('Interest',fun)}</div>
              <div className="stat-val">{fmtN(interest,sym,locale)}</div>
            </div>
            <div className="stat accent">
              <div className="stat-label">{T('Total value',fun)}</div>
              <div className="stat-val">{fmtN(finalBal,sym,locale)}</div>
            </div>
          </div>
          <div className="ticker">
            {[[T('Return',fun),`${multiplier}×`,'up'],[T('CAGR',fun),`${cagr}%`,'up'],[T('Horizon',fun),`${years}Y`,'neu'],[T('Rate',fun),`${rate}% p.a.`,'neu']].map(([k,v,c],i,arr)=>(
              <React.Fragment key={k}>
                <div className="ticker-item">
                  <span className="ticker-key">{k}</span>
                  <span className={`ticker-val ${c}`}>{v}</span>
                </div>
                {i<arr.length-1&&<div className="ticker-sep"></div>}
              </React.Fragment>
            ))}
          </div>
          <div className="legend">
            <div className="legend-item">
              <span className="legend-sq" style={{background:fun?'rgba(57,255,20,0.75)':'rgba(22,199,132,0.7)'}}></span>
              {fun?'🤑 free money':'Interest earned'}
            </div>
            <div className="legend-item">
              <span className="legend-sq" style={{background:fun?'rgba(0,229,255,0.5)':'rgba(26,110,240,0.45)',border:fun?'1px solid rgba(0,229,255,0.4)':'1px solid rgba(26,110,240,0.4)'}}></span>
              {fun?'💸 money put in':'Amount invested'}
            </div>
          </div>
          <div className="chart-wrap">
            <canvas ref={canvasRef}></canvas>
          </div>
        </div>
      </div>

      <div className="table-panel">
        <div className="table-top">
          <span className="table-title">{T('Year-by-year breakdown',fun)}</span>
          <span className="table-badge">{rows.length} {T('periods',fun)} · {FREQS.find(f=>f.key===freq).label} {T('compounding',fun)}</span>
        </div>
        <div className="table-scroll">
          <table>
            <thead><tr>
              <th>{fun?'Yr 📅':'Year'}</th>
              <th>{fun?'Stack 💰':'Portfolio value'}</th>
              <th>{fun?'Put in 💸':'Total invested'}</th>
              <th>{fun?'Free $ 🎰':'Yr interest'}</th>
              <th>{fun?'Total W 🏆':'Total gain'}</th>
              <th>{fun?'Gainz % 📈':'Return %'}</th>
            </tr></thead>
            <tbody>
              {rows.map(row=>{
                const pct=((row.balance/row.totalContrib-1)*100).toFixed(1);
                return(
                  <tr key={row.year}>
                    <td>Y{row.year}</td>
                    <td className="tot">{fmtN(row.balance,sym,locale)}</td>
                    <td>{fmtN(row.totalContrib,sym,locale)}</td>
                    <td className="up">+{fmtN(row.yearInterest,sym,locale)}</td>
                    <td className="up">+{fmtN(row.balance-row.totalContrib,sym,locale)}</td>
                    <td className="up">+{pct}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <div className="footer-bar">
        <p className="footer-note">
          <strong>{T('Not financial advice.',fun)}</strong>{' '}
          {T('Projections assume a constant rate of return and are illustrative only. Past performance does not guarantee future results.',fun)}
        </p>
        <div className="footer-brand">InvestIQ · <span>{fun?'v2.0 🤓':'v2.0'}</span></div>
      </div>
    </div>
  );
}

function TopicModal({ topic, onClose, fun }){
  const { detail, title, icon, level, warn } = topic;
  const lvlColor = {l100:'var(--blue)',l200:'var(--green)',l300:'var(--amber)',l400:'var(--purple)'}[level];

  useEffect(()=>{
    const esc=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',esc);
    return()=>window.removeEventListener('keydown',esc);
  },[]);

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-head">
          <div className="card-icon" style={{background:`color-mix(in srgb, ${lvlColor} 15%, transparent)`,fontSize:22}}>{icon}</div>
          <div>
            <span className={`card-level ${level}`}>{level.toUpperCase()}</span>
            <div style={{fontSize:16,fontWeight:600,color:'var(--text)'}}>{title}</div>
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <h3>{fun?'> what_is_this.md':'What is it?'}</h3>
          <p>{detail.what}</p>
          <h3>{fun?'> how_it_works.sh':'How it works'}</h3>
          <p>{detail.how}</p>
          <h3>{fun?'> example.log':'Real-world example'}</h3>
          <div className="example-box">
            <strong>{fun?'📌 scenario: ':'📌 Example: '}</strong>{detail.example}
          </div>
          {warn&&<div className="warn-box"><span className="warn-icon">⚠️</span><span>{warn}</span></div>}
          <h3>{fun?'> risks.txt (read this)':'Risks to know'}</h3>
          <ul>{detail.risks.map((r,i)=><li key={i}>{r}</li>)}</ul>

      </div>
    </div>
  );
}

let portCharts = {};
const CAT_COLORS = {
  'ETF':        '#1a6ef0','Stocks':    '#16c784','Bonds':      '#f59e0b',
  'Cash':       '#8b5cf6','Property':  '#14b8a6','Commodities':'#e5392b',
  'Crypto':     '#ff006e','Other':     '#64748b',
};
const CAT_LIST   = Object.keys(CAT_COLORS);
const SECTOR_LIST= ['Technology','Healthcare','Finance','Consumer','Energy','Industrials','Materials','Utilities','Real Estate','Communication','Global','Government','Cash','Other'];

const DEFAULT_HOLDINGS = [
  {id:1,name:'VWRP – Global ETF',   value:15000,cat:'ETF',    sector:'Global'    },
  {id:2,name:'CSPX – S&P 500 ETF',  value:8000, cat:'ETF',    sector:'Technology'},
  {id:3,name:'AAPL – Apple',         value:3500, cat:'Stocks', sector:'Technology'},
  {id:4,name:'VGOV – UK Gilts',      value:5000, cat:'Bonds',  sector:'Government'},
  {id:5,name:'Cash ISA',             value:2000, cat:'Cash',   sector:'Cash'      },
];

function PortfolioPage({ fun }){
  const [holdings,  setHoldings ] = useState(DEFAULT_HOLDINGS);
  const [nextId,    setNextId   ] = useState(6);
  const [newName,   setNewName  ] = useState('');
  const [newVal,    setNewVal   ] = useState('');
  const [newCat,    setNewCat   ] = useState('ETF');
  const [newSector, setNewSector] = useState('Global');
  const donutRef = useRef(null);
  const barRef   = useRef(null);

  const total = holdings.reduce((s,h)=>s+h.value,0)||1;

  // Build donut data
  const catMap = {};
  holdings.forEach(h=>{ catMap[h.cat]=(catMap[h.cat]||0)+h.value; });
  const catLabels = Object.keys(catMap);
  const catVals   = catLabels.map(c=>catMap[c]);
  const catColors = catLabels.map(c=>CAT_COLORS[c]||'#64748b');

  // Build sector bar data
  const secMap = {};
  holdings.forEach(h=>{ secMap[h.sector]=(secMap[h.sector]||0)+h.value; });
  const secLabels = Object.keys(secMap).sort((a,b)=>secMap[b]-secMap[a]);
  const secVals   = secLabels.map(s=>secMap[s]);

  const fmtC = v => '£'+Math.round(v).toLocaleString('en-GB');
  const pct  = v => ((v/total)*100).toFixed(1)+'%';

  useEffect(()=>{
    if(!donutRef.current) return;
    if(portCharts.donut){ portCharts.donut.data.labels=catLabels; portCharts.donut.data.datasets[0].data=catVals; portCharts.donut.data.datasets[0].backgroundColor=catColors; portCharts.donut.update('none'); }
    else portCharts.donut=new Chart(donutRef.current,{
      type:'doughnut',
      data:{labels:catLabels,datasets:[{data:catVals,backgroundColor:catColors,borderWidth:2,borderColor:'var(--surface)'}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'65%',animation:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a2132',titleColor:'rgba(220,228,240,0.5)',bodyColor:'#dce4f0',titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:11},callbacks:{label:ctx=>` ${ctx.label}: £${Math.round(ctx.raw).toLocaleString('en-GB')} (${((ctx.raw/total)*100).toFixed(1)}%)`}}}},
    });
  },[holdings]);

  useEffect(()=>{
    if(!barRef.current) return;
    const colors = secLabels.map((_,i)=>`hsl(${(i*47)%360},60%,55%)`);
    if(portCharts.bar){ portCharts.bar.data.labels=secLabels; portCharts.bar.data.datasets[0].data=secVals; portCharts.bar.data.datasets[0].backgroundColor=colors; portCharts.bar.update('none'); }
    else portCharts.bar=new Chart(barRef.current,{
      type:'bar',
      data:{labels:secLabels,datasets:[{data:secVals,backgroundColor:colors,borderRadius:3}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,animation:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a2132',bodyColor:'#dce4f0',bodyFont:{family:'JetBrains Mono',size:11},callbacks:{label:ctx=>` £${Math.round(ctx.raw).toLocaleString('en-GB')} (${((ctx.raw/total)*100).toFixed(1)}%)`}}},
        scales:{
          x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(220,228,240,0.28)',font:{family:'JetBrains Mono',size:9},callback:v=>'£'+(v>=1000?(v/1000).toFixed(0)+'k':v)},border:{display:false}},
          y:{grid:{display:false},ticks:{color:'rgba(220,228,240,0.35)',font:{family:'JetBrains Mono',size:9}},border:{display:false}},
        }},
    });
  },[holdings]);

  useEffect(()=>()=>{Object.values(portCharts).forEach(c=>c.destroy()); portCharts={};},[]);

  const addHolding=()=>{
    const v=parseFloat(newVal);
    if(!newName.trim()||!v||v<=0) return;
    setHoldings(h=>[...h,{id:nextId,name:newName.trim(),value:v,cat:newCat,sector:newSector}]);
    setNextId(n=>n+1); setNewName(''); setNewVal('');
  };
  const removeHolding=id=>setHoldings(h=>h.filter(x=>x.id!==id));

  // Concentration warnings
  const topSec = secLabels[0];
  const topSecPct = total>0?((secMap[topSec]||0)/total)*100:0;
  const cashPct   = total>0?((catMap['Cash']||0)/total)*100:0;

  const tagLine = fun ? '> portfolio_xray.py --run' : '🗂️ Portfolio Analysis';

  return(
    <div className="page">
      <div className="tool-hero">
        <div className="tool-hero-left">
          <div className="tool-hero-tag">{tagLine}</div>
          <h2>{fun?'YOUR ASSET MATRIX 📊':'Portfolio Analyzer'}</h2>
          <p>{fun?'add ur bags below. we\'ll tell u if ur cooked (too much tech) or actually diversified 🤓':'Add your holdings to see your true asset allocation, sector exposure, and concentration risks at a glance.'}</p>
        </div>
        <div className="stat accent" style={{minWidth:140,textAlign:'center',flexShrink:0}}>
          <div className="stat-label">{fun?'TOTAL BAGS':'Total Portfolio'}</div>
          <div className="stat-val">{fmtC(total)}</div>
        </div>
      </div>

      <div className="two-col">
        {/* Left: holdings */}
        <div className="panel">
          <div className="panel-head"><div className="panel-dot"></div><span className="panel-label">{fun?'🎒 ur bags':'Holdings'}</span></div>

          <div style={{maxHeight:260,overflowY:'auto',scrollbarWidth:'thin',scrollbarColor:'var(--surface3) transparent'}}>
            {holdings.map(h=>(
              <div className="holding-row" key={h.id}>
                <div style={{width:8,height:8,borderRadius:'50%',background:CAT_COLORS[h.cat]||'#64748b',flexShrink:0}}></div>
                <div className="holding-name">{h.name}</div>
                <div className="holding-value">{fmtC(h.value)}</div>
                <div className="holding-cat" style={{background:CAT_COLORS[h.cat]+'22',color:CAT_COLORS[h.cat]}}>{h.cat}</div>
                <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10,color:'var(--text-3)',width:42,textAlign:'right'}}>{pct(h.value)}</div>
                <button className="holding-del" onClick={()=>removeHolding(h.id)}>×</button>
              </div>
            ))}
          </div>

          <div className="add-row" style={{marginTop:14}}>
            <input type="text"   placeholder="Asset name" value={newName}   onChange={e=>setNewName(e.target.value)}   style={{flex:2,minWidth:80}} onKeyDown={e=>e.key==='Enter'&&addHolding()}/>
            <input type="number" placeholder="Value £"    value={newVal}    onChange={e=>setNewVal(e.target.value)}    style={{width:88}}/>
            <select value={newCat}    onChange={e=>setNewCat(e.target.value)}>{CAT_LIST.map(c=><option key={c}>{c}</option>)}</select>
            <select value={newSector} onChange={e=>setNewSector(e.target.value)}>{SECTOR_LIST.map(s=><option key={s}>{s}</option>)}</select>
            <button className="add-btn" onClick={addHolding}>{fun?'+ bag':'+ Add'}</button>
          </div>
        </div>

        {/* Right: donut + health */}
        <div className="panel">
          <div className="panel-head"><div className="panel-dot" style={{background:'var(--green)'}}></div><span className="panel-label">{fun?'🥧 allocation pie':'Allocation'}</span></div>
          <div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>

let mcChart = null;

function randNorm(mean, std){
  const u1=Math.random()||1e-10, u2=Math.random();
  return mean + std * Math.sqrt(-2*Math.log(u1)) * Math.cos(2*Math.PI*u2);
}

function runMC(P, contrib, years, meanPct, stdPct, n){
  const mean=meanPct/100, std=stdPct/100;
  const sims = Array.from({length:n},()=>{
    let v=P; const path=[v];
    for(let y=0;y<years;y++){ v=Math.max(0,v*(1+randNorm(mean,std))+contrib); path.push(Math.round(v)); }
    return path;
  });
  const pctiles = [5,10,25,50,75,90,95];
  const byYear = Array.from({length:years+1},(_,y)=>{
    const vals=sims.map(s=>s[y]).sort((a,b)=>a-b);
    const obj={};
    pctiles.forEach(p=>{ obj[p]=vals[Math.max(0,Math.floor(p/100*vals.length)-1)]; });
    return obj;
  });
  return { byYear, finalVals:sims.map(s=>s[years]) };
}

function computeFeeSchedule(P, contrib, years, grossReturn, feePct){
  const netR = (grossReturn-feePct)/100;
  let v=P; const vals=[v];
  for(let y=0;y<years;y++){ v=v*(1+netR)+contrib*12; vals.push(Math.round(Math.max(0,v))); }
  return vals;
}

                <div className={`fee-card${t.cls?' '+t.cls:''}`} key={t.name}>
                  <div className="fee-card-name">{t.name}</div>
                  <div className="fee-card-pct">{t.fee}% / yr · {t.label}</div>
                  <div className="fee-card-val">{fmtK(finalVals[i])}</div>
                  {i>0&&<div className="fee-card-loss">-{fmtK(bestVal-finalVals[i])} vs passive</div>}
                  {i===0&&<div className="fee-card-loss" style={{color:'var(--green)'}}>← optimal</div>}
                </div>
              ))}
            </div>
            <div className="chart-wrap-lg"><canvas ref={feeCanvasRef}></canvas></div>
            <div className="legend" style={{marginTop:8}}>
              {FEE_TIERS.map((t,i)=>{
                const colors=[fun?'#39ff14':'#16c784','#1a6ef0','#f59e0b',fun?'#ff006e':'#e5392b'];
                return <div className="legend-item" key={t.name}><span className="legend-sq" style={{background:colors[i]}}></span>{t.fee}%</div>;
              })}
            </div>
          </div>
        </div>
        {bestVal-finalVals[3]>0&&<div className="warn-box">
          <span className="warn-icon">💡</span>
          <span style={{color:'var(--amber)'}}>
            {fun
              ?`switching from 1.75% to 0.07% saves u ${fmtK(bestVal-finalVals[3])} over ${years} years. that's literally a deposit on a flat 🏠`
              :`Switching from a 1.75% fund to a 0.07% passive ETF saves ${fmtK(bestVal-finalVals[3])} over ${years} years — on the same gross market return.`}
          </span>
        </div>}
      </>}

      {tab==='tax'&&<>
        <div className="two-col">
          <div className="panel">
            <div className="panel-head"><div className="panel-dot"></div><span className="panel-label">{fun?'⚙️ settings':'Parameters'}</span></div>
            <SlC label="Starting value"       min={1000}  max={200000} step={500} value={taxPortVal}  onChange={setTaxPortVal}  display={fmtC(taxPortVal)}/>
            <SlC label="Monthly contribution" min={0}     max={3000}   step={50}  value={taxContrib}  onChange={setTaxContrib}  display={taxContrib===0?'None':'£'+taxContrib}/>
            <SlC label="Time horizon"         min={5}     max={40}     step={1}   value={taxYears}    onChange={setTaxYears}    display={`${taxYears} yrs`}/>
            <SlC label="Annual return"        min={2}     max={20}     step={0.5} value={taxReturn}   onChange={setTaxReturn}   display={`${taxReturn}%`}/>
            <div style={{marginTop:8,padding:'10px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',fontSize:12,color:'var(--text-2)',lineHeight:1.6}}>
              {fun?'📌 assumes ~20% tax drag on GIA gains (CGT + dividend tax) vs 0% inside ISA. actual tax depends on ur situation':'Assumes ~20% effective tax drag on GIA returns (CGT + dividend tax). ISA returns are completely tax-free. Consult an adviser for your situation.'}
            </div>
          </div>
          <div className="panel">
            <div className="panel-head"><div className="panel-dot" style={{background:'var(--green)'}}></div><span className="panel-label">{fun?'🛡️ isa vs taxable':'ISA vs GIA'}</span></div>
            <div className="stats" style={{marginBottom:14}}>
              <div className="stat accent">
                <div className="stat-label">{fun?'ISA value 🛡️':'ISA final value'}</div>
                <div className="stat-val">{fmtK(isaVals[taxYears])}</div>
              </div>
              <div className="stat">
                <div className="stat-label">{fun?'taxable 😓':'GIA final value'}</div>
                <div className="stat-val" style={{color:'var(--amber)'}}>{fmtK(giaVals[taxYears])}</div>
              </div>
              <div className="stat" style={{borderColor:'var(--green-mid)',background:'var(--green-dim)'}}>
                <div className="stat-label" style={{color:'rgba(22,199,132,0.6)'}}>{fun?'tax saved 🤑':'Tax shelter benefit'}</div>
                <div className="stat-val" style={{color:'var(--green)'}}>{fmtK(taxSaving)}</div>
              </div>
            </div>
            <div className="chart-wrap-lg"><canvas ref={taxCanvasRef}></canvas></div>
            <div className="legend" style={{marginTop:8}}>
              <div className="legend-item"><span className="legend-sq" style={{background:fun?'#39ff14':'#16c784'}}></span>ISA (0% tax)</div>
              <div className="legend-item"><span className="legend-sq" style={{background:fun?'#ff006e':'#e5392b'}}></span>GIA (taxable)</div>
            </div>
          </div>
        </div>
        <div className="warn-box" style={{borderColor:'var(--green-mid)',background:'var(--green-dim)'}}>
          <span className="warn-icon">✅</span>
          <span style={{color:'var(--green)'}}>
            {fun
              ?`bro just use ur ISA allowance (£20k/yr). it's literally free money from the government ✂️ taxes`
              :`Max your ISA allowance (£20,000/year) before investing in a taxable account. The tax shelter benefit compounds powerfully over time.`}
          </span>
        </div>
      </>}

      <div className="footer-bar">
        <p className="footer-note"><strong>{fun?'Not financial advice bb 💅.':'Not financial advice.'}</strong>{' '}{fun?'tax rules change. uk only. don\'t sue us 🫶':'Fee and tax calculations are illustrative. Tax treatment depends on individual circumstances. UK-focused assumptions.'}</p>
        <div className="footer-brand">InvestIQ · <span>{fun?'v2.0 🤓':'v2.0'}</span></div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────
   APP
───────────────────────────────────────── */
const PAGES = [
  { key:'tools', label:'Tools', funLabel:'🕹️ Tools',
    items:[
      {key:'calculator', icon:'📊',label:'Investment Calculator',   sub:'Compound return projector',        bg:'var(--blue-dim)'  },
      {key:'portfolio',  icon:'🗂️',label:'Portfolio Analyzer',      sub:'Allocation, sectors & health',     bg:'var(--green-dim)' },
      {key:'montecarlo', icon:'🎲',label:'Monte Carlo Simulator',   sub:'500 simulated market paths',       bg:'var(--amber-dim)' },
      {key:'feetax',     icon:'💸',label:'Fee & Tax Optimizer',     sub:'Hidden costs & ISA vs GIA',        bg:'var(--purple-dim)'},
    ] },
  { key:'education', label:'Education', funLabel:'🧠 Learn',
    items:[{key:'education',icon:'📚',label:'Investor Education',sub:'L100 → L400 learning path',bg:'var(--green-dim)'}] },
];

function App(){
  const [page,  setPage]  = useState('calculator');
  const [theme, setTheme] = useState('dark');
  const [fun,   setFun]   = useState(false);
  const [open,  setOpen]  = useState(null);

  const toggleTheme = ()=>{
    const next = theme==='dark'?'light':'dark';
    setTheme(next);
    document.documentElement.setAttribute('data-theme', next);
    if(fun) document.documentElement.setAttribute('data-fun','true'); // keep fun override
  };

  const toggleFun = ()=>{
    const next = !fun;
    setFun(next);
    document.documentElement.setAttribute('data-fun', next?'true':'false');
    if(next) document.documentElement.setAttribute('data-theme','dark');
    else      document.documentElement.setAttribute('data-theme', theme);
    if(chartInst){ chartInst.destroy(); chartInst=null; }
    if(mcChart){ mcChart.destroy(); mcChart=null; }
    if(feeChart){ feeChart.destroy(); feeChart=null; }
    if(taxChart){ taxChart.destroy(); taxChart=null; }
    Object.values(portCharts).forEach(c=>c.destroy()); portCharts={};
  };

  const navigate = key=>{
    setPage(key); setOpen(null);
    if(key!=='calculator'&&chartInst){chartInst.destroy();chartInst=null;}
  };

  useEffect(()=>{
    const h=()=>setOpen(null);
    document.addEventListener('click',h);
    return()=>document.removeEventListener('click',h);
  },[]);

  return(
    <>
      <FunFloaters fun={fun}/>

      {/* NAV */}
      <nav className="nav">
        <a className="nav-brand" href="#" onClick={e=>{e.preventDefault();navigate('calculator');}}>
          <div className="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M3 17l5-5 4 4 9-9v3.5l-9 9-4-4-5 5V17z"/></svg>
          </div>
          <span className="nav-brand-name">{fun?'INVESTIQ.EXE':'InvestIQ'}</span>
        </a>

        <div className="nav-menu" onClick={e=>e.stopPropagation()}>
          {PAGES.map(pg=>(
            <div className="nav-item" key={pg.key}>
              <button
                className={`nav-btn${pg.items.some(i=>i.key===page)?' active':''}${open===pg.key?' open':''}`}
                onClick={()=>setOpen(open===pg.key?null:pg.key)}
              >
                {fun?pg.funLabel:pg.label}
                <svg viewBox="0 0 10 6" fill="none" stroke="currentColor" strokeWidth="1.5">
                  <path d="M1 1l4 4 4-4"/>
                </svg>
              </button>
              <div className={`dropdown${open===pg.key?' open':''}`}>
                {pg.items.map(item=>(
                  <div key={item.key} className={`dropdown-item${page===item.key?' active':''}`}
                    onClick={()=>navigate(item.key)}>
                    <div className="di-icon" style={{background:item.bg,fontSize:15}}>{item.icon}</div>
                    <div><div className="di-label">{item.label}</div><div className="di-sub">{item.sub}</div></div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>

        <div className="nav-right">
          {/* Theme toggle */}
          <button className="icon-btn" onClick={toggleTheme} title="Toggle theme" style={{display:fun?'none':'flex'}}>
            {theme==='dark'
              ?<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
              :<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" strokeWidth="2" fill="none"/></svg>
            }
          </button>

          {/* Fun toggle */}
          <button
            className={`icon-btn fun-toggle-btn${fun?' fun-on':''}`}
            onClick={toggleFun}
            title={fun?'turn off chaotic energy':'activate CHAOS MODE 🤓'}
          >
            🤓
          </button>
        </div>
      </nav>

      {/* Fun ticker tape */}
      {fun && <FunTape/>}

      {/* Pages */}
      {page==='calculator' && <CalculatorPage fun={fun}/>}
      {page==='portfolio'  && <PortfolioPage  fun={fun}/>}
      {page==='montecarlo' && <MonteCarloPage fun={fun}/>}
      {page==='feetax'     && <FeeTaxPage     fun={fun}/>}
      {page==='education'  && <EducationPage  fun={fun}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
